<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DIG Network Status</title>
  <meta name="description" content="Live health and uptime for the DIG Network — rpc.dig.net, hub.dig.net, docs.dig.net, dig.net, the §21 CDN, coinset.org and Chia mainnet." />
  <meta name="theme-color" content="#5800D6" />
  <meta property="og:title" content="DIG Network Status" />
  <meta property="og:description" content="Live health and uptime for the core DIG Network systems." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://status.dig.net" />
  <!-- Machine-readable alternates: agents should read the JSON, not scrape the DOM. -->
  <link rel="alternate" type="application/json" href="/health.json" title="DIG Network health summary" />
  <link rel="alternate" type="application/json" href="/status.json" title="DIG Network full status" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%235800D6'/%3E%3Cpath d='M11 9h5a7 7 0 0 1 0 14h-5z' fill='none' stroke='%23fff' stroke-width='3'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="wrap header-row">
      <a class="brand" href="https://dig.net" aria-label="DIG Network">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 32 32" width="28" height="28"><circle cx="16" cy="16" r="15" fill="url(#g)"/><path d="M11 9h5a7 7 0 0 1 0 14h-5z" fill="none" stroke="#fff" stroke-width="3"/><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5800D6"/><stop offset="1" stop-color="#FF00DE"/></linearGradient></defs></svg>
        </span>
        <span class="brand-text">DIG Network <span class="brand-text-accent">Status</span></span>
      </a>
      <nav class="header-links">
        <a href="https://hub.dig.net">DIGHUb</a>
        <a href="https://docs.dig.net">Docs</a>
        <a href="https://dig.net">dig.net</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <!-- Overall banner -->
    <section id="overall" class="overall is-loading" aria-live="polite" data-testid="overall">
      <div class="overall-dot" aria-hidden="true"></div>
      <div class="overall-text">
        <h1 id="overall-title">Checking system status…</h1>
        <p id="overall-sub" class="muted">Loading the latest health check.</p>
      </div>
    </section>

    <!-- Summary chips -->
    <section id="summary" class="summary" hidden>
      <div class="chip chip-up"><span class="chip-n" id="n-up">0</span> Operational</div>
      <div class="chip chip-degraded"><span class="chip-n" id="n-degraded">0</span> Degraded</div>
      <div class="chip chip-down"><span class="chip-n" id="n-down">0</span> Down</div>
    </section>

    <!-- System list (grouped by category) -->
    <section id="systems" class="systems" aria-label="Monitored systems"></section>

    <p id="error" class="error-note" hidden></p>
  </main>

  <footer class="site-footer">
    <div class="wrap footer-row">
      <p class="muted small">
        Last checked <span id="generated-at">—</span>.
        Probes run server-side every few minutes and are committed to the
        <a href="https://github.com/DIG-Network/status.dig.net">status.dig.net</a> repo.
      </p>
      <p class="muted small">
        <a href="https://discord.gg/dignetwork">Discord</a> · part of the
        <a href="https://dig.net">DIG Network</a>.
      </p>
    </div>
  </footer>

  <!-- Row template -->
  <template id="row-tpl">
    <div class="row">
      <div class="row-status">
        <span class="dot" aria-hidden="true"></span>
        <span class="sr-only status-word"></span>
      </div>
      <div class="row-main">
        <div class="row-name"></div>
        <div class="row-desc muted small"></div>
      </div>
      <div class="row-spark" aria-hidden="true"></div>
      <div class="row-meta">
        <div class="row-uptime"><span class="uptime-val">—</span><span class="muted small"> uptime</span></div>
        <div class="row-latency muted small">—</div>
      </div>
    </div>
  </template>

  <script src="./app.js" defer></script>
</body>
</html>
