<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Social-card image for Open Graph / Twitter previews. Standard 1200x630
       OG aspect ratio. Static SVG (no build step) to match this repo's
       zero-dependency, no-bundler convention — see scripts/build.js. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14122B" />
      <stop offset="1" stop-color="#2A0A52" />
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5800D6" />
      <stop offset="1" stop-color="#FF00DE" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <circle cx="150" cy="150" r="90" fill="url(#mark)" opacity="0.9" />
  <path d="M112 118h50a32 32 0 0 1 0 64h-50z" fill="none" stroke="#fff" stroke-width="12" />
  <text x="110" y="330" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-size="72" font-weight="700" fill="#ffffff">DIG Network</text>
  <text x="110" y="410" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-size="72" font-weight="700" fill="#FF6FE8">Status</text>
  <text x="110" y="470" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-size="30" fill="#C9C4E8">Live health &amp; uptime for the core DIG Network systems</text>
  <text x="110" y="560" font-family="'Space Mono', ui-monospace, monospace" font-size="26" fill="#8A87A8">status.dig.net</text>
</svg>
