name: probe

# Scheduled server-side health checks. Probes every monitored endpoint
# (lib/targets.js) from the runner — NO browser, so no live-CORS issues — and
# commits the refreshed public/status.json + public/history.json back to the
# repo. The static dashboard fetches those committed files, so the data path is
# just GitHub Pages-style static hosting (here: S3/CloudFront). A successful
# probe commit to main triggers the deploy workflow, so the live site updates.
on:
  schedule:
    # Every 5 minutes. (GitHub may coalesce/delay cron under load; that is fine
    # — the dashboard shows last-checked age and history regardless.)
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

# Never let two probe runs race on the commit/push of status.json.
concurrency:
  group: status-probe
  cancel-in-progress: false

permissions:
  contents: write # commit the refreshed status.json/history.json

jobs:
  probe:
    name: probe + commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
      - name: run probes
        run: node scripts/run-probes.js
      - name: commit refreshed status
        run: |
          set -euo pipefail
          git config user.name  "dig-status-bot"
          git config user.email "noreply@dig.net"
          git add public/status.json public/history.json
          if git diff --cached --quiet; then
            echo "no status change; nothing to commit"
            exit 0
          fi
          git commit -m "chore(status): refresh probe results [skip ci]"
          # Rebase onto any concurrent commits, then push.
          git pull --rebase --autostash origin main
          git push origin HEAD:main
