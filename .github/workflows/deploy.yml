name: deploy

# Build the static dashboard (public/ -> dist/ via scripts/build.js), replace
# the contents of the S3 website bucket, and invalidate CloudFront. Mirrors
# dig.net's deploy.yml one-for-one.
#
# PARAMETERIZED: the S3 bucket, CloudFront distribution, and the OIDC deploy
# role are read from repo VARS/secrets because the status.dig.net infra is not
# provisioned yet (see README "Deploy" + the parent provisioning note). Set:
#   vars.STATUS_S3_BUCKET                  e.g. status-dig-net
#   vars.STATUS_CLOUDFRONT_DISTRIBUTION_ID e.g. EXXXXXXXXXXXXX
#   vars.CI_DEPLOY_ROLE_ARN                the OIDC role to assume (same scheme
#                                          as dig.net)
# Until those exist the job builds + verifies and then NO-OPs the sync with a
# clear message, so it stays green pre-provisioning.
on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

# Serialize deploys so two runs never race on `s3 sync --delete`.
concurrency:
  group: status-deploy
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # OIDC (assume the deploy role; no stored keys)

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    name: build + sync + invalidate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
      - run: node scripts/build.js # public/ -> ./dist

      - name: check infra is provisioned
        id: infra
        env:
          BUCKET: ${{ vars.STATUS_S3_BUCKET }}
          DIST: ${{ vars.STATUS_CLOUDFRONT_DISTRIBUTION_ID }}
          ROLE: ${{ vars.CI_DEPLOY_ROLE_ARN }}
        run: |
          if [ -n "$BUCKET" ] && [ -n "$DIST" ] && [ -n "$ROLE" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=status.dig.net deploy::Infra not provisioned yet — set repo vars STATUS_S3_BUCKET, STATUS_CLOUDFRONT_DISTRIBUTION_ID, CI_DEPLOY_ROLE_ARN. Skipping S3 sync (build verified)."
          fi

      - name: configure aws (oidc)
        if: steps.infra.outputs.ready == 'true'
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: ${{ vars.CI_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: sync to S3 + invalidate CloudFront
        if: steps.infra.outputs.ready == 'true'
        env:
          S3_BUCKET: ${{ vars.STATUS_S3_BUCKET }}
          CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.STATUS_CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          set -euo pipefail
          # The probe-generated docs (status.json/history.json/health.json) must
          # never be served stale: sync the bulk of the site with normal caching,
          # then re-put those JSON files with no-cache. (The *.schema.json files
          # are static contracts and ride the normal-cache sync.)
          aws s3 sync dist "s3://${S3_BUCKET}" --delete \
            --exclude 'status.json' --exclude 'history.json' --exclude 'health.json'
          aws s3 cp dist/status.json  "s3://${S3_BUCKET}/status.json"  --cache-control 'no-cache, max-age=0'
          aws s3 cp dist/history.json "s3://${S3_BUCKET}/history.json" --cache-control 'no-cache, max-age=0' || true
          aws s3 cp dist/health.json  "s3://${S3_BUCKET}/health.json"  --cache-control 'no-cache, max-age=0' || true
          aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" --paths '/*'
